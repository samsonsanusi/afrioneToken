name: Newman tests

# Trigger the workflow on push to main branch or pull requests
on:
  push:
  pull_request:

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install newman and Allure reporter
      - name: Install Newman and HTML extra reporter
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      # Directory for test result
      - name: Create Result Directory
        run: mkdir -p testResults

      # Step 3: Install dependencies
      - name: Run API Tests
        run: |
          newman run AfrToken.postman_collection.json
           -e petenvironment.postman_environment.json \
           -r htmlextra \
          --reporter-htmlextra-export testResults/htmlreport.html      

      # Step 4: Upload test as an artifact
      - name: upload test report
        uses: actions/upload-artifact@v4
        with: 
          name: RunReports
          path: testResults