name: API Tests

on:
  push:
  pull_request:

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      # 1 Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2 Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3 Install project dependencies (Newman + reporters from package.json)
      - name: Install dependencies
        run: npm install

      # 4 Create directory for test results
      - name: Create Result Directory
        run: mkdir -p testResults

      # 5 Run API tests with Newman
      - name: Run API Tests
        run: |
          npx newman run AfrToken.postman_collection.json \
            -e afrToken.postman_environment.json \
            -r htmlextra \
            --reporter-htmlextra-export testResults/htmlreport.html

      # 6 Upload HTML Extra report (even if tests fail)
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RunReports
          path: testResults