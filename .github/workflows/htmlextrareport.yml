name: API Tests

on:
  push:
  pull_request:

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      # 1️: Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2: Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3: Install Newman and HTML extra reporter
      - name: Install Newman and Html Extra reporter
        run: |
         npm install -g newman
         npm install -g newman-reporter-htmlextra

      # 4: Create a directory for test results
      - name: Create Result Directory
        run: mkdir -p testResults

      # 5: Run Newman API tests with HTML Extra Reporter
      - name: Run API Tests
        run: |
         newman run AfrToken.postman_collection.json \ -e afrToken.postman_environment.json \
          -r htmlextra \ --reporter-htmlextra-export testResults/htmlreport.html

      # 6: Upload test result as an artifact
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: RunReports
          path: testResults